<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- IMPORTANT for mobile responsiveness -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parcel Dashboard</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
  color: #333;
}

/* Header */
h1 {
  text-align: center;
  padding: 20px 10px;
  margin: 0;
  background: #ffffff;
  font-size: 22px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* Card / Box */
.box {
  background: #ffffff;
  padding: 22px 15px;
  border-radius: 14px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
  line-height: 1.4;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  user-select: none;
}

/* Hover / Tap effect */
.box:hover,
.box:active {
  transform: scale(0.97);
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
}

/* Extra spacing for very small screens */
@media (max-width: 480px) {
  h1 {
    font-size: 20px;
  }
  .box {
    font-size: 14px;
    padding: 20px 12px;
  }
}
</style>
</head>

<body>

<h1>📦 Parcel Dashboard</h1>

<div class="grid">

  <div class="box" onclick="window.location.href='parcel_entry.html'">
    📦📝 Parcel Entry Form
  </div>

  <div class="box" onclick="window.location.href='parcel_entry_form.html'">
    📦🔍 Received → Scanner
  </div>

  <div class="box" onclick="window.location.href='upload_sample_images.html'">
    📷 Upload Sample Images
  </div>

  <div class="box" onclick="window.location.href='delivered_today.html'">
    📅 Delivered Today
  </div>

  <div class="box" onclick="openApp('https://script.google.com/a/macros/dnalabsindia.com/s/AKfycbyRGVI_o6lBULgdc53o0EfWrbWnkC5t7WZLgQ2VpToNp3WGuBIl7-Sv_64wQXQk-uVoLw/exec')">
    🖼️ Sample Gallery
  </div>

  <div class="box" onclick="window.location.href='total.html'">
    📊 Total Samples
  </div>

</div>

<script>
function openApp(url) {
  window.open(url, '_blank');
}
</script>

</body>
</html>
