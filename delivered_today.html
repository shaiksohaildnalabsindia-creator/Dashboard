<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Today's Delivered Parcels</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ---------- PAGE LAYOUT ---------- */
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* Content shifts because of sidebar */
.main-content {
  margin-left: 230px;
  padding: 20px;
  transition: margin-left 0.3s;
}

/* 🔥 WHEN SIDEBAR COLLAPSES */
body.sidebar-collapsed .main-content {
  margin-left: 70px;
}

@media (max-width: 768px) {
  .main-content {
    margin-left: 0;
  }
}

/* ---------- TABLE ---------- */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

th {
  background: #f4f4f4;
}

.count {
  font-size: 18px;
  font-weight: bold;
  margin: 10px 0;
}

a {
  color: #007bff;
  cursor: pointer;
  text-decoration: underline;
}

/* ---------- MODAL ---------- */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.modal.show {
  display: flex;
}

.modal-content {
  max-width: 95vw;
  max-height: 95vh;
  overflow: auto;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.gallery img {
  max-width: 200px;
  border-radius: 6px;
  cursor: zoom-in;
}

/* ---------- FULLSCREEN ---------- */
.fullscreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 3000;
}

.fullscreen.show {
  display: flex;
}

.fullscreen img {
  max-width: 95vw;
  max-height: 95vh;
}
</style>
</head>

<body>

<!-- ---------- SIDEBAR ---------- -->
<div id="sidebar-container"></div>

<!-- ---------- MAIN CONTENT ---------- -->
<div class="main-content">

  <h2>📦 Today's Delivered Parcels</h2>
  <div class="count" id="count"></div>

  <table>
    <thead>
      <tr>
        <th>Tracking No</th>
        <th>From City</th>
        <th>Delivery Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<!-- ---------- IMAGE MODAL ---------- -->
<div id="imageModal" class="modal">
  <div class="modal-content">
    <div class="gallery" id="gallery"></div>
  </div>
</div>

<!-- ---------- FULLSCREEN ---------- -->
<div id="fullscreen" class="fullscreen">
  <img id="fsImage">
</div>

<script>
/* ---------- LOAD SIDEBAR ---------- */
fetch("sidebar.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("sidebar-container").innerHTML = html;
    const currentPage = location.pathname.split("/").pop();
    document.querySelectorAll(".sidebar nav a").forEach(link => {
      if (link.dataset.page === currentPage) {
        link.classList.add("active");
     }
   });   
  });

/* ---------- APIs ---------- */
const PARCEL_API = "https://script.google.com/macros/s/AKfycby9f86QjvNESTF8Rm0oYfaZEMOvpCjyQ_TZL1id8lkLZu0Ck1qYPIhrSwVbxYuxdSUe7g/exec";
const IMAGE_API  = "https://script.google.com/macros/s/AKfycbwZw152zyjIA1gU5Ssn4YRl8kTXrdaDlMB8XzZWHc6Hb4WNI7C6D5W4xH-sRI0lE_ZNTA/exec";

/* ---------- ELEMENTS ---------- */
const tbody = document.getElementById("tableBody");
const countDiv = document.getElementById("count");
const imageModal = document.getElementById("imageModal");
const gallery = document.getElementById("gallery");
const fullscreen = document.getElementById("fullscreen");
const fsImage = document.getElementById("fsImage");

let currentImages = [];

/* ---------- LOAD DATA ---------- */
function loadData() {
  const old = document.getElementById("jsonp");
  if (old) old.remove();

  const s = document.createElement("script");
  s.src = PARCEL_API + "?callback=handleData";
  s.id = "jsonp";
  document.body.appendChild(s);
}

function handleData(data) {
  tbody.innerHTML = "";
  countDiv.innerText = "Total Delivered Today: " + data.length;

  data.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><a onclick="openModal('${r.trackingNumber}')">${r.trackingNumber}</a></td>
      <td>${r.fromAddress}</td>
      <td>${r.deliveryDate}</td>
      <td>${r.status}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* ---------- MODAL ---------- */
function openModal(tracking) {
  imageModal.classList.add("show");
  gallery.innerHTML = "";
  fetchImages(tracking.toLowerCase());
}

imageModal.addEventListener("click", e => {
  if (e.target === imageModal) imageModal.classList.remove("show");
});

/* ---------- IMAGES ---------- */
function fetchImages(query) {
  fetch(IMAGE_API)
    .then(r => r.json())
    .then(data => {
      currentImages = data.filter(i =>
        i.caption.toLowerCase().includes(query)
      );

      if (!currentImages.length) {
        gallery.innerHTML = "<p style='color:white'>No images found</p>";
        return;
      }

      currentImages.forEach((img, i) => {
        const el = document.createElement("img");
        el.src = img.url;
        el.onclick = () => openFullscreen(i);
        gallery.appendChild(el);
      });
    });
}

/* ---------- FULLSCREEN ---------- */
function openFullscreen(index) {
  fsImage.src = currentImages[index].url;
  fullscreen.classList.add("show");
}

fullscreen.addEventListener("click", () => {
  fullscreen.classList.remove("show");
});

/* ---------- INIT ---------- */
window.onload = () => {
  loadData();
  setInterval(loadData, 60000);
};
</script>

</body>
</html>
