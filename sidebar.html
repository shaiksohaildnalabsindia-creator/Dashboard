<!-- sidebar.html -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    <span class="title">Dashboard</span>
  </div>

  <nav>
    <a href="index.html" data-page="index.html"><span>🏠 Dashboard</span></a>
    <a href="parcel_entry.html" data-page="parcel_entry.html"><span>📦 Parcel Entry</span></a>
    <a href="parcel_entry_form.html" data-page="parcel_entry_form.html"><span>🔍 Received Scanner</span></a>
    <a href="upload_sample_images.html" data-page="upload_sample_images.html"><span>📷 Upload Images</span></a>
    <a href="delivered_today.html" data-page="delivered_today.html"><span>📅 Delivered Today</span></a>
    <a href="total.html" data-page="total.html"><span>📊 Total Parcels</span></a>
  </nav>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<style>
/* ---------- SIDEBAR ---------- */
.sidebar {
  position: fixed;
  inset: 0 auto 0 0;
  width: 230px;
  background: #1e293b;
  color: #fff;
  transition: width 0.3s, transform 0.3s;
  z-index: 1000;
}

.sidebar.collapsed {
  width: 70px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  padding: 15px;
  background: #0f172a;
}

.toggle-btn {
  font-size: 20px;
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  margin-right: 10px;
}

.title {
  font-weight: bold;
}

/* ---------- MENU ---------- */
.sidebar nav {
  padding: 10px;
}

.sidebar nav a {
  display: flex;
  align-items: center;
  padding: 10px;
  margin-bottom: 8px;
  background: #334155;
  color: #fff;
  text-decoration: none;
  border-radius: 6px;
}

.sidebar nav a.active {
  background: #2563eb;
}

.sidebar nav a:hover {
  background: #475569;
}

/* hide text when collapsed */
.sidebar.collapsed nav a span,
.sidebar.collapsed .title {
  display: none;
}

/* ---------- MOBILE ---------- */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 900;
  }
  .overlay.show {
    display: block;
  }
}
</style>

<script>
/* ---------- FUNCTIONS ---------- */
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");

  if (window.innerWidth <= 768) {
    sidebar.classList.add("open");
    document.getElementById("overlay").classList.add("show");
  } else {
    sidebar.classList.toggle("collapsed");
  }
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}
</script>
