<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Sample Images</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f6f8; color: #333; display: flex; justify-content: center; padding: 20px; }
  .form-container { width: 100%; max-width: 800px; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  h2 { margin-bottom: 20px; }
  .form-group { margin-bottom: 25px; }
  label { display: block; margin-bottom: 8px; font-weight: 500; }
  select, .upload-input { width: 100%; padding: 14px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 15px; background: #f9fafb; }
  select:focus { border-color: #3b82f6; background: #fff; outline: none; }
  .preview-container { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; padding: 15px; background: #f9fafb; border-radius: 12px; border: 2px dashed #d1d5db; min-height: 120px; }
  .preview { width: 120px; height: 120px; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; background: #fff; }
  .preview img { width: 100%; height: 100%; object-fit: cover; }
  .remove-btn { position: absolute; top: 6px; right: 6px; background: #ef4444; color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; cursor: pointer; }
  #addMoreBtn { width: 120px; height: 120px; font-size: 36px; display: flex; align-items: center; justify-content: center; background: #10b981; color: white; border: none; border-radius: 10px; cursor: pointer; }
  .button-group { display: flex; gap: 15px; margin-top: 30px; }
  button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .submit-btn { background: #3b82f6; color: white; }
  .clear-btn { background: #f3f4f6; color: #4b5563; border: 1.5px solid #d1d5db; }
  .error-message { color: #dc3545; font-size: 13px; margin-top: 5px; display: none; }
  .image-counter { background: #3b82f6; color: white; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-left: 8px; }
</style>
</head>
<body>

<div class="form-container">
  <h2>📷 Upload Sample Images</h2>

  <!-- Tracking No Dropdown -->
  <div class="form-group">
    <label for="trackingSelect">Select Tracking No</label>
    <select id="trackingSelect">
      <option value="">Loading tracking numbers...</option>
    </select>
    <div class="error-message" id="trackingError">Please select a tracking number</div>
  </div>

  <!-- Patient Name Dropdown -->
  <div class="form-group">
    <label for="patientSelect">Select Patient Name
      <span id="patientCount" class="image-counter" style="display:none;">0 available</span>
    </label>
    <select id="patientSelect">
      <option value="">Loading patients...</option>
    </select>
    <div class="error-message" id="patientError">Please select a patient</div>
  </div>

  <!-- Image Upload -->
  <div class="form-group">
    <label for="imageUpload">Select Images
      <span id="imageCount" class="image-counter">0 selected</span>
    </label>
    <div class="preview-container" id="previewContainer">
      <button type="button" id="addMoreBtn" aria-label="Add more images">+</button>
    </div>
    <div class="error-message" id="imageError">Please select at least one image</div>
  </div>

  <div class="button-group">
    <button class="submit-btn" onclick="uploadImages()" id="uploadBtn">📤 Upload Images</button>
    <button class="clear-btn" onclick="clearAll()">🗑️ Clear All</button>
  </div>
</div>

<script>
const TRACKING_URL = "https://script.google.com/macros/s/AKfycbxrAMIt5g_szYTWAXFAACOI7R-XpJiP9CS9bGEsX5bja552Ic-EoAJwbBSN99ZTwdyU_A/exec";
const PATIENT_URL = "https://script.google.com/macros/s/AKfycbxB5-Po-A-N70dR7Ie9VXP0QDHw1hFARAhaMTDoD4FbcNbDrPdh4W1nWootW1iepmtWbA/exec";

const trackingSelect = document.getElementById('trackingSelect');
const patientSelect = document.getElementById('patientSelect');
const previewContainer = document.getElementById('previewContainer');
const addMoreBtn = document.getElementById('addMoreBtn');
const uploadBtn = document.getElementById('uploadBtn');
const patientCount = document.getElementById('patientCount');
const imageCount = document.getElementById('imageCount');

let filesToUpload = [];

// Load tracking numbers dynamically
function loadTrackingNumbers() {
  fetch(TRACKING_URL)
    .then(res => res.json())
    .then(data => {
      trackingSelect.innerHTML = '<option value="">Select Tracking No</option>';
      if(!data || data.length === 0){
        trackingSelect.innerHTML = '<option value="">No tracking numbers</option>';
        return;
      }
      data.forEach(trk => {
        const option = document.createElement('option');
        option.value = trk;
        option.textContent = trk;
        trackingSelect.appendChild(option);
      });
    })
    .catch(err => console.error(err));
}

// Load today's patients dynamically
function loadPatients() {
  fetch(PATIENT_URL)
    .then(res => res.json())
    .then(data => {
      patientSelect.innerHTML = '<option value="">Select Patient</option>';
      if(!data || data.length === 0){
        patientSelect.innerHTML = '<option value="">No patients today</option>';
        patientCount.style.display = 'none';
        return;
      }
      data.forEach(p => {
        const option = document.createElement('option');
        option.value = p;
        option.textContent = p;
        patientSelect.appendChild(option);
      });
      patientCount.textContent = `${data.length} available`;
      patientCount.style.display = 'inline-block';
    })
    .catch(err => console.error(err));
}

// Image handling
function handleFileInput(file) {
  const wrapper = document.createElement("div");
  wrapper.className = "preview";

  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);

  const removeBtn = document.createElement("button");
  removeBtn.className = "remove-btn";
  removeBtn.textContent = "×";
  removeBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const index = filesToUpload.indexOf(file);
    if(index > -1) filesToUpload.splice(index, 1);
    wrapper.remove();
    updateImageCounter();
    validateForm();
  });

  wrapper.appendChild(img);
  wrapper.appendChild(removeBtn);
  previewContainer.insertBefore(wrapper, addMoreBtn);
  filesToUpload.push(file);
  updateImageCounter();
  validateForm();
}

function updateImageCounter() {
  const count = filesToUpload.length;
  imageCount.textContent = `${count} selected`;
  imageCount.style.display = 'inline-block';
}

addMoreBtn.addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.multiple = true;
  input.style.display = "none";

  input.addEventListener("change", (event) => {
    const fileList = event.target.files;
    if(fileList.length > 0){
      for(let i=0;i<fileList.length;i++){
        handleFileInput(fileList[i]);
      }
    }
  });

  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
});

function validateForm() {
  let isValid = true;

  if(!trackingSelect.value){
    document.getElementById('trackingError').style.display = 'block';
    isValid = false;
  } else { document.getElementById('trackingError').style.display = 'none'; }

  if(!patientSelect.value){
    document.getElementById('patientError').style.display = 'block';
    isValid = false;
  } else { document.getElementById('patientError').style.display = 'none'; }

  if(filesToUpload.length === 0){
    document.getElementById('imageError').style.display = 'block';
    isValid = false;
  } else { document.getElementById('imageError').style.display = 'none'; }

  return isValid;
}

// Placeholder resize function
function resizeImage(file){ return Promise.resolve(URL.createObjectURL(file)); }

// In your HTML, update the uploadImages function:

async function uploadImages(){
  if(!validateForm()){ 
    alert('Please fix errors before uploading'); 
    return; 
  }

  uploadBtn.disabled = true;
  uploadBtn.textContent = "Uploading...";

  const tracking = trackingSelect.value.trim();
  const patient = patientSelect.value.trim();

  try {
    // Resize images if needed (keep your existing resizeImage function)
    const resizePromises = filesToUpload.map(f => resizeImage(f));
    const resizedImages = await Promise.all(resizePromises);
    
    // Filter out any null/undefined results
    const validImages = resizedImages.filter(img => img && img !== '');
    
    if (validImages.length === 0) {
      throw new Error('No valid images to upload');
    }

    // Join images with pipe separator
    const imagesParam = validImages.join("|");

    const response = await fetch(PATIENT_URL, {
      method: "POST",
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
      },
      body: new URLSearchParams({ 
        tracking: tracking, 
        patient: patient, 
        image: imagesParam 
      })
    });
    
    const data = await response.json();
    
    if(data.success){
      alert(`✅ ${data.message || 'Images uploaded successfully!'}`);
      
      // Clear form
      filesToUpload.forEach(f => {
        if (typeof f === 'object' && f.preview) {
          URL.revokeObjectURL(f.preview);
        }
      });
      
      filesToUpload = [];
      previewContainer.querySelectorAll('.preview').forEach(div => div.remove());
      updateImageCounter();
      
    } else {
      throw new Error(data.error || 'Upload failed');
    }
  } catch(err){
    console.error('Upload error:', err);
    alert(`❌ Upload failed: ${err.message}`);
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.textContent = "📤 Upload Images";
  }
}

// Make sure resizeImage function returns a valid base64 string:
function resizeImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = function(e) {
      resolve(e.target.result); // This should be a data URL
    };
    reader.readAsDataURL(file);
  });
}

function clearAll(){
  filesToUpload.forEach(f => URL.revokeObjectURL(f));
  previewContainer.querySelectorAll('.preview').forEach(div=>div.remove());
  filesToUpload = [];
  updateImageCounter();
  trackingSelect.value = '';
  patientSelect.value = '';
  document.getElementById('trackingError').style.display = 'none';
  document.getElementById('patientError').style.display = 'none';
  document.getElementById('imageError').style.display = 'none';
}

window.addEventListener('load', () => {
  loadTrackingNumbers();
  loadPatients();
});
</script>
</body>
</html>
