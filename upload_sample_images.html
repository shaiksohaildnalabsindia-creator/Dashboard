<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Sample Images - Secure</title>
  <!-- ADD GOOGLE SIGN-IN LIBRARY -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ... keep all your existing styles ... */
    
    /* ADD AUTH OVERLAY STYLES */
    .auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }
    
    .auth-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
      border: 1px solid #e2e8f0;
    }
    
    .auth-logo {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    .auth-container h2 {
      color: #1e293b;
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    .auth-container p {
      color: #64748b;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .auth-error {
      background: #fef2f2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
      display: none;
      border: 1px solid #fecaca;
    }
    
    .auth-error.show {
      display: block;
    }
    
    .logout-btn {
      background: none;
      border: 1px solid #e2e8f0;
      padding: 8px 16px;
      border-radius: 8px;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 10px;
    }
    
    .logout-btn:hover {
      background: #f1f5f9;
      color: #1e293b;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .user-name {
      font-size: 14px;
      color: #475569;
      font-weight: 500;
    }
    
    .user-avatar {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    }
    
    /* Loading state */
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 18px;
      color: #64748b;
    }
  </style>
</head>
<body>

<!-- AUTHENTICATION OVERLAY -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-container">
    <div class="auth-logo">🔐</div>
    <h2>Secure Access Required</h2>
    <p>Please sign in with your authorized Google account to access the Parcel Management System.</p>
    
    <!-- Google Sign-In Button -->
    <div id="g_id_onload"
         data-client_id="475181452158-s27nhhcf50epigesqb7em8qc0r4nt1be.apps.googleusercontent.com
"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left"
         data-width="100%">
    </div>
    
    <div class="auth-error" id="authError">
      Your Google account is not authorized to access this system.
    </div>
  </div>
</div>

<!-- MAIN APP (Hidden until authenticated) -->
<div id="mainApp" style="display: none;">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <!-- ... keep your existing sidebar code ... -->
  </aside>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
      <div class="page-info">
        <div class="page-title">
          <span>📷</span>
          <span>Upload Sample Images</span>
        </div>
        <div class="page-subtitle">Upload images with tracking number and patient details</div>
      </div>
      <div class="user-menu">
        <button class="refresh-btn" onclick="reloadAll()">
          <span>🔄</span>
          <span>Refresh Data</span>
        </button>
        
        <!-- USER INFO (Updated with real user data) -->
        <div class="user-info">
          <span class="user-name" id="displayUserName">Loading...</span>
          <div class="user-avatar" id="userAvatar">U</div>
          <button class="logout-btn" onclick="signOut()">Sign Out</button>
        </div>
      </div>
    </header>

    <!-- Form Content -->
    <div class="form-wrapper">
      <!-- ... keep your existing form code ... -->
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
// ============================================
// 🔐 AUTHENTICATION CONFIGURATION
// ============================================
const AUTH_CONFIG = {
  // Replace with your Google OAuth 2.0 Client ID
  clientId: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
  
  // List of allowed Google account emails
  allowedEmails: [
    'youremail@gmail.com',
    'colleague@company.com',
    'admin@yourdomain.com'
  ],
  
  // Apps Script Web App URLs (already secured with doGet authentication)
  TRACKING_URL: 'https://script.google.com/macros/s/AKfycbxrAMIt5g_szYTWAXFAACOI7R-XpJiP9CS9bGEsX5bja552Ic-EoAJwbBSN99ZTwdyU_A/exec',
  PATIENT_URL: 'https://script.google.com/macros/s/AKfycbxB5-Po-A-N70dR7Ie9VXP0QDHw1hFARAhaMTDoD4FbcNbDrPdh4W1nWootW1iepmtWbA/exec'
};

// Current authenticated user
let currentUser = null;

// ============================================
// 🔐 GOOGLE SIGN-IN CALLBACK
// ============================================
function handleCredentialResponse(response) {
  try {
    // Decode the JWT token to get user info
    const responsePayload = decodeJwtResponse(response.credential);
    
    const userEmail = responsePayload.email;
    const userName = responsePayload.name || userEmail.split('@')[0];
    const userPicture = responsePayload.picture;
    
    console.log('User authenticated:', userEmail);
    
    // Check if user is allowed
    if (!AUTH_CONFIG.allowedEmails.includes(userEmail)) {
      showAuthError('Your Google account is not authorized to access this system.');
      return;
    }
    
    // Store user info
    currentUser = {
      email: userEmail,
      name: userName,
      picture: userPicture,
      token: response.credential
    };
    
    // Save to localStorage for persistence
    localStorage.setItem('parcelUser', JSON.stringify(currentUser));
    
    // Show the main app
    showMainApp();
    
    // Update UI with user info
    updateUserDisplay();
    
    // Initialize the app
    initializeApp();
    
  } catch (error) {
    console.error('Authentication error:', error);
    showAuthError('Authentication failed. Please try again.');
  }
}

// Decode JWT token
function decodeJwtResponse(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(jsonPayload);
}

// Show authentication error
function showAuthError(message) {
  const errorDiv = document.getElementById('authError');
  errorDiv.textContent = message;
  errorDiv.classList.add('show');
  
  // Clear any stored user data
  localStorage.removeItem('parcelUser');
  currentUser = null;
}

// Hide auth overlay and show main app
function showMainApp() {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

// Update user display in topbar
function updateUserDisplay() {
  if (!currentUser) return;
  
  const nameEl = document.getElementById('displayUserName');
  const avatarEl = document.getElementById('userAvatar');
  
  if (nameEl) {
    nameEl.textContent = currentUser.name.split(' ')[0]; // First name only
  }
  
  if (avatarEl) {
    const initial = currentUser.name.charAt(0).toUpperCase();
    avatarEl.textContent = initial;
    
    if (currentUser.picture) {
      avatarEl.style.backgroundImage = `url(${currentUser.picture})`;
      avatarEl.style.backgroundSize = 'cover';
      avatarEl.textContent = '';
    }
  }
}

// Sign out function
function signOut() {
  // Clear stored data
  localStorage.removeItem('parcelUser');
  currentUser = null;
  
  // Revoke Google token if using Google Identity Services
  if (window.google && google.accounts && google.accounts.id) {
    google.accounts.id.disableAutoSelect();
  }
  
  // Reload page to show auth overlay
  window.location.reload();
}

// ============================================
// 🔐 SECURE API CALLS (With authentication)
// ============================================
async function secureFetch(url, options = {}) {
  if (!currentUser) {
    throw new Error('Not authenticated');
  }
  
  // Add credentials to include Google session cookie
  const secureOptions = {
    ...options,
    credentials: 'include',  // Critical: Sends Google session
    headers: {
      ...options.headers,
      'Authorization': `Bearer ${currentUser.token}`
    }
  };
  
  try {
    const response = await fetch(url, secureOptions);
    
    // Check for unauthorized response from Apps Script
    if (response.status === 401 || response.status === 403) {
      // Session expired or unauthorized
      signOut();
      throw new Error('Session expired. Please sign in again.');
    }
    
    // Try to parse JSON and check for error field
    const data = await response.clone().json();
    if (data.error === 'Unauthorized') {
      signOut();
      throw new Error('Access denied by server.');
    }
    
    return response;
    
  } catch (error) {
    if (error.message.includes('Unauthorized') || error.message.includes('Session expired')) {
      showToast('Your session has expired. Please sign in again.', 'error');
      signOut();
    }
    throw error;
  }
}

// ============================================
// 📊 MODIFIED DATA LOADING FUNCTIONS (with auth)
// ============================================
function loadTrackingNumbers() {
  secureFetch(AUTH_CONFIG.TRACKING_URL)
    .then(res => {
      if (!res.ok) throw new Error('Network response was not ok');
      return res.json();
    })
    .then(data => {
      trackingSelect.innerHTML = '<option value="">Select Tracking Number</option>';
      
      if (!data || data.length === 0) {
        const option = document.createElement('option');
        option.value = "";
        option.textContent = "No tracking numbers available";
        trackingSelect.appendChild(option);
        showToast('No tracking numbers found', 'info');
        return;
      }
      
      data.forEach(trk => {
        const option = document.createElement('option');
        option.value = trk;
        option.textContent = trk;
        trackingSelect.appendChild(option);
      });
      
      showToast(`Loaded ${data.length} tracking numbers`, 'success');
    })
    .catch(err => {
      console.error('Error loading tracking numbers:', err);
      trackingSelect.innerHTML = '<option value="">Error loading tracking numbers</option>';
      
      // Don't show toast if it's an auth error (already handled)
      if (!err.message.includes('Unauthorized')) {
        showToast('Failed to load tracking numbers', 'error');
      }
    });
}

function loadPatients() {
  secureFetch(AUTH_CONFIG.PATIENT_URL)
    .then(res => {
      if (!res.ok) throw new Error('Network response was not ok');
      return res.json();
    })
    .then(data => {
      patientSelect.innerHTML = '<option value="">Select Patient</option>';
      
      if (!data || data.length === 0) {
        const option = document.createElement('option');
        option.value = "";
        option.textContent = "No patients available";
        patientSelect.appendChild(option);
        patientCount.style.display = 'none';
        showToast('No patients found for today', 'info');
        return;
      }
      
      data.forEach(patientName => {
        const option = document.createElement('option');
        option.value = patientName;
        option.textContent = patientName;
        patientSelect.appendChild(option);
      });
      
      patientCount.textContent = `${data.length} available`;
      patientCount.style.display = 'inline-block';
      showToast(`Loaded ${data.length} patients`, 'success');
    })
    .catch(err => {
      console.error('Error loading patients:', err);
      patientSelect.innerHTML = '<option value="">Error loading patients</option>';
      patientCount.style.display = 'none';
      
      if (!err.message.includes('Unauthorized')) {
        showToast('Failed to load patients', 'error');
      }
    });
}

// ============================================
// 📤 MODIFIED UPLOAD FUNCTION (with auth)
// ============================================
async function uploadImages() {
  if (!validateForm()) {
    showToast('Please fix the errors in the form', 'error');
    return;
  }

  if (isLoading) return;
  
  const tracking = trackingSelect.value.trim();
  const patient = patientSelect.value.trim();
  
  isLoading = true;
  uploadBtn.disabled = true;
  uploadBtn.innerHTML = '<span class="spinner"></span><span>Uploading...</span>';
  
  statusDiv.className = 'status-container status-loading';
  statusDiv.innerHTML = '<div class="loading-spinner"></div><div>Processing and uploading images...</div>';
  statusDiv.style.display = 'block';

  try {
    const resizePromises = filesToUpload.map(file => resizeImage(file, 1000000));
    const resizedImages = await Promise.all(resizePromises);
    const validImages = resizedImages.filter(img => img && img !== '');
    
    if (validImages.length === 0) {
      throw new Error('No valid images to upload');
    }

    const imagesParam = validImages.join("|");

    // Use secureFetch instead of direct fetch
    const response = await secureFetch(AUTH_CONFIG.PATIENT_URL, {
      method: "POST",
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
      },
      body: new URLSearchParams({ 
        tracking: tracking, 
        patient: patient, 
        image: imagesParam 
      })
    });
    
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    const data = await response.json();
    
    if (data.success) {
      showToast('Images uploaded successfully!', 'success');
      statusDiv.className = 'status-container status-success';
      statusDiv.innerHTML = `
        <div style="display: flex; align-items: center; gap: 10px;">
          <span style="font-size: 24px;">✅</span>
          <div>
            <strong>Upload Successful!</strong>
            <div style="margin-top: 5px; font-size: 14px;">
              Tracking: ${tracking}<br>
              Patient: ${patient}<br>
              Images: ${filesToUpload.length} uploaded<br>
              Time: ${new Date().toLocaleTimeString()}
            </div>
          </div>
        </div>
      `;
      
      filesToUpload.forEach(file => {
        const img = document.querySelector(`img[src*="${URL.createObjectURL(file)}"]`);
        if (img) URL.revokeObjectURL(img.src);
      });
      
      previewContainer.querySelectorAll('.preview').forEach(div => div.remove());
      filesToUpload = [];
      updateImageCounter();
      loadPatients();
      
    } else {
      throw new Error(data.error || 'Upload failed');
    }
    
  } catch (err) {
    console.error('Upload error:', err);
    
    // Don't show error toast if it's an auth error (handled by secureFetch)
    if (!err.message.includes('Unauthorized') && !err.message.includes('Session expired')) {
      showToast(`Upload failed: ${err.message}`, 'error');
    }
    
    statusDiv.className = 'status-container status-error';
    statusDiv.innerHTML = `
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 24px;">❌</span>
        <div>
          <strong>Upload Failed</strong>
          <div style="margin-top: 5px; font-size: 14px;">
            ${err.message}
          </div>
        </div>
      </div>
    `;
  } finally {
    isLoading = false;
    uploadBtn.disabled = false;
    uploadBtn.innerHTML = '<span>📤</span><span>Upload Images</span>';
  }
}

// ============================================
// 🚀 INITIALIZATION
// ============================================
function initializeApp() {
  // Load initial data
  loadTrackingNumbers();
  loadPatients();
  
  // Set up event listeners
  setupEventListeners();
  
  // Check sidebar state
  const wasCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
  if (wasCollapsed) {
    sidebar.classList.add('collapsed');
    mainContent.classList.add('sidebar-collapsed');
  }
  updateMenuTooltips();
}

// Check for existing session on page load
function checkExistingSession() {
  const savedUser = localStorage.getItem('parcelUser');
  
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser);
      
      // Verify token is still valid (basic check - not expired)
      const tokenParts = currentUser.token?.split('.');
      if (tokenParts && tokenParts.length === 3) {
        const payload = JSON.parse(atob(tokenParts[1]));
        const expiryTime = payload.exp * 1000; // Convert to milliseconds
        
        if (Date.now() < expiryTime) {
          // Token still valid
          showMainApp();
          updateUserDisplay();
          initializeApp();
          return true;
        }
      }
    } catch (e) {
      console.error('Invalid saved session:', e);
    }
    
    // Clear invalid session
    localStorage.removeItem('parcelUser');
  }
  
  return false;
}

// Setup event listeners (move your existing listeners here)
function setupEventListeners() {
  // Add More button
  addMoreBtn.addEventListener("click", () => {
    imageUpload.click();
  });
  
  // File input change
  imageUpload.addEventListener('change', (event) => {
    const fileList = event.target.files;
    if (fileList.length > 0) {
      for (let i = 0; i < fileList.length; i++) {
        if (filesToUpload.length < 20) {
          handleFileInput(fileList[i]);
        } else {
          showToast('Maximum 20 images allowed', 'error');
          break;
        }
      }
    }
    imageUpload.value = '';
  });
  
  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      uploadImages();
    }
    if (e.key === 'Escape') {
      clearAll();
    }
  });
  
  // Drag and drop
  document.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.stopPropagation();
  });
  
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    
    if (e.dataTransfer.files.length > 0) {
      for (let i = 0; i < e.dataTransfer.files.length; i++) {
        if (e.dataTransfer.files[i].type.startsWith('image/')) {
          if (filesToUpload.length < 20) {
            handleFileInput(e.dataTransfer.files[i]);
          } else {
            showToast('Maximum 20 images allowed', 'error');
            break;
          }
        }
      }
    }
  });
}

// Keep all your existing utility functions (resizeImage, validateForm, etc.)
// ... copy the rest of your existing JavaScript functions here ...
// (handleFileInput, updateImageCounter, validateForm, clearAll, 
//  showToast, toggleSidebar, toggleCollapse, updateMenuTooltips, etc.)

// Page load
window.addEventListener('load', () => {
  // Try to restore existing session first
  if (!checkExistingSession()) {
    // Show auth overlay (already visible by default)
    console.log('Waiting for user authentication...');
  }
});

</script>
</body>
</html>
